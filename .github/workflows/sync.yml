name: Sync

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  schedule:
    - cron: "0 19 25 * *" # 毎月26日 04:00 JST
  workflow_dispatch:

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    uses: queria-io/dataset-shared/.github/workflows/sync.yml@main
    with:
      dataset_name: p_portal
      s3_bucket: ${{ vars.S3_BUCKET }}
    secrets: inherit
